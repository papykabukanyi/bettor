services:
  - type: web
    name: bettor-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --workers 1 is deliberate: this app runs its own in-process background
    # scheduler (APScheduler) for the perps data-collect / train / trading
    # cycles. Running more than one worker means every scheduled job --
    # including live Kalshi order placement -- fires once per worker,
    # independently and concurrently, which risks duplicate orders. Do not
    # raise this without adding proper cross-worker coordination first.
    # --timeout 60 (gunicorn default is 30s): a slow Kalshi API response on
    # /api/status used to be able to exceed the default and get the single
    # worker killed + restarted by gunicorn's arbiter, which re-ran the
    # whole startup sequence (scheduler rebuilt from scratch) and showed up
    # as the dashboard "losing everything" every so often. Caching in
    # dashboard.py fixes the underlying slowness; this is defense-in-depth.
    startCommand: gunicorn --chdir src dashboard:app --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 60
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Pinned here (not left to manual dashboard config) after this service
      # ran for a while still pointed at an old repo from before this project
      # became perps-only -- Render's Blueprint sync keeps these enforced on
      # every deploy instead of depending on someone clicking through the
      # dashboard correctly. Secrets (KALSHI_API_KEY, KALSHI_PRIVATE_KEY,
      # HF_API_KEY, KALSHI_PERPS_LIVE_TRADING_ENABLED, ...) stay manually set
      # in the Render dashboard's Environment tab -- never put secrets or the
      # live-trading toggle in a git-tracked file.
      - key: HF_DATASET_REPO
        value: papylove/kalshi-perps-data
      - key: HF_MODEL_REPO
        value: papylove/kalshi-perps-model
