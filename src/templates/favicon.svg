<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="#1e3a8a" stroke-width="1"/>

  <!-- Dollar sign -->
  <g fill="url(#accent)">
    <!-- Vertical line -->
    <rect x="14.5" y="8" width="3" height="16" rx="1.5"/>
    <!-- Top curve -->
    <path d="M12 10 Q12 8 14 8 L18 8 Q20 8 20 10 L20 12 Q20 14 18 14 L14 14 Q12 14 12 12 Z"/>
    <!-- Bottom curve -->
    <path d="M12 20 Q12 18 14 18 L18 18 Q20 18 20 20 L20 22 Q20 24 18 24 L14 24 Q12 24 12 22 Z"/>
  </g>

  <!-- Sparkle effects -->
  <g fill="#fbbf24" opacity="0.8">
    <circle cx="8" cy="8" r="1"/>
    <circle cx="24" cy="8" r="1"/>
    <circle cx="8" cy="24" r="1"/>
    <circle cx="24" cy="24" r="1"/>
  </g>
</svg>