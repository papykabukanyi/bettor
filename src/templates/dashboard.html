<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Bettor HF Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
:root{
  --bg:#07131f;--card:#0d1b2a;--card2:#13263a;--accent:#2b90d9;--accent2:#1d5f90;
  --border:#27405a;--text:#e6eef7;--muted:#9ab0c8;--green:#22c55e;--red:#ef4444;
  --yellow:#f59e0b;--purple:#8b5cf6;--shadow:0 12px 30px rgba(0,0,0,.32);--radius:16px;
}
*{box-sizing:border-box}
body{margin:0;background:
  radial-gradient(900px 500px at 10% -10%,rgba(43,144,217,.22),transparent 60%),
  radial-gradient(800px 420px at 100% 0,rgba(139,92,246,.16),transparent 55%),
  var(--bg);color:var(--text);font:14px/1.45 Inter,Segoe UI,system-ui,sans-serif}
a{color:inherit;text-decoration:none}
button,input,select{font:inherit}
.shell{max-width:1200px;margin:0 auto;padding:16px}
.hero{display:flex;flex-direction:column;gap:14px;padding:18px;border:1px solid var(--border);border-radius:var(--radius);background:linear-gradient(145deg,rgba(13,27,42,.98),rgba(9,19,31,.98));box-shadow:var(--shadow)}
.hero-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.hero h1{margin:0;font-size:1.6rem}
.hero p{margin:6px 0 0;color:var(--muted)}
.status-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.03);color:var(--muted)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px rgba(43,144,217,.7)}
.metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.metric,.card,.table-wrap,.empty,.notice{border:1px solid var(--border);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow)}
.metric{padding:14px}
.metric .label{display:block;color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em}
.metric .value{display:block;margin-top:6px;font-size:1.1rem;font-weight:700}
.tabs{display:flex;gap:8px;overflow:auto;padding:6px 0 2px}
.tab{border:1px solid var(--border);background:var(--card);color:var(--muted);padding:10px 14px;border-radius:12px;cursor:pointer;white-space:nowrap}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.panel{display:none;margin-top:14px}
.panel.active{display:block}
.grid{display:grid;gap:12px}
.steps{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{padding:16px}
.card h3,.section-title{margin:0 0 10px;font-size:1rem}
.muted{color:var(--muted)}
.kv{display:grid;gap:6px;margin-top:10px}
.kv div{display:flex;justify-content:space-between;gap:10px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge.success{background:rgba(34,197,94,.15);color:var(--green)}
.badge.warn{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge.idle{background:rgba(43,144,217,.15);color:#8bc8f3}
.badge.error{background:rgba(239,68,68,.15);color:var(--red)}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;min-width:720px}
th,td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top}
th{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);background:var(--card2);text-align:left}
tr:last-child td{border-bottom:none}
.match{font-weight:700}
.sub{display:block;margin-top:4px;color:var(--muted);font-size:.82rem}
.conf{font-weight:700}
.conf.elite{color:var(--green)}
.conf.solid{color:#7dd3fc}
.conf.lean{color:var(--yellow)}
.conf.uncertain{color:var(--red)}
.section{display:grid;gap:12px}
.two-col{grid-template-columns:1fr}
.empty,.notice{padding:18px;color:var(--muted)}
.footer-note{margin-top:14px;color:var(--muted);font-size:.85rem;text-align:center}
.small{font-size:.84rem}
@media (min-width:760px){
  .shell{padding:24px}
  .metrics{grid-template-columns:repeat(4,minmax(0,1fr))}
  .two-col{grid-template-columns:1.1fr .9fr}
}
</style>
</head>
<body>
<div class="shell">
  <section class="hero">
    <div class="hero-top">
      <div>
        <h1>HF Pipeline Dashboard</h1>
        <p>Automatic multi-sport deployment pipeline for MLB, NBA, NHL, and Soccer.</p>
      </div>
      <div class="status-chip"><span class="dot"></span><span id="refresh-status">Loading HF pipeline…</span></div>
    </div>
    <div class="metrics" id="top-metrics"></div>
  </section>

  <nav class="tabs" aria-label="HF dashboard tabs">
    <button class="tab active" data-tab="pipeline">🔄 Pipeline</button>
    <button class="tab" data-tab="today">🎯 Today</button>
    <button class="tab" data-tab="tomorrow">📅 Tomorrow</button>
    <button class="tab" data-tab="history">📊 History</button>
    <button class="tab" data-tab="model">🤖 Model</button>
  </nav>

  <section class="panel active" id="panel-pipeline">
    <div class="grid steps" id="pipeline-steps"></div>
    <div class="grid two-col" style="margin-top:12px">
      <div class="card" id="pipeline-summary"></div>
      <div class="card" id="pipeline-files"></div>
    </div>
  </section>

  <section class="panel" id="panel-today">
    <div class="table-wrap" id="today-table"></div>
  </section>

  <section class="panel" id="panel-tomorrow">
    <div class="table-wrap" id="tomorrow-table"></div>
  </section>

  <section class="panel" id="panel-history">
    <div class="table-wrap" id="history-table"></div>
  </section>

  <section class="panel" id="panel-model">
    <div class="section">
      <div class="grid two-col">
        <div class="card" id="dataset-stats"></div>
        <div class="card" id="current-model"></div>
      </div>
      <div class="table-wrap" id="training-history"></div>
    </div>
  </section>

  <div class="footer-note">Auto-refreshing every 60 seconds • HF data only</div>
</div>

<script>
const state = { pipeline:{}, today:{predictions:[]}, tomorrow:{predictions:[]}, dataset:{}, model:{history:[]} };

function esc(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function pct(value){
  const n = Number(value);
  return Number.isFinite(n) ? `${(n * 100).toFixed(1)}%` : '—';
}
function num(value){
  const n = Number(value);
  return Number.isFinite(n) ? n.toLocaleString() : '—';
}
function stamp(value){
  if (!value) return '—';
  const d = new Date(value);
  return Number.isNaN(d.getTime()) ? String(value) : d.toLocaleString();
}
function joinList(value){
  return Array.isArray(value) && value.length ? value.join(', ') : '—';
}
function tierClass(value){
  const t = String(value || 'uncertain').toLowerCase();
  return ['elite','solid','lean','uncertain'].includes(t) ? t : 'uncertain';
}
function badgeClass(ok, fallback){
  if (ok === true) return 'success';
  if (ok === false) return 'error';
  return fallback || 'idle';
}
async function fetchJson(url){
  const res = await fetch(url, {cache:'no-store'});
  if (!res.ok) throw new Error(`${url} -> ${res.status}`);
  return res.json();
}
function renderTopMetrics(){
  const pipeline = state.pipeline || {};
  const today = state.today || {};
  const tomorrow = state.tomorrow || {};
  const model = state.model || {};
  const metrics = [
    {label:'Last Step', value:pipeline.last_step || 'not_run'},
    {label:'Predictions', value:`${num(today.prediction_count || 0)} today / ${num(tomorrow.prediction_count || 0)} tomorrow`},
    {label:'Model', value:model.current_model || pipeline.best_model || '—'},
    {label:'Updated', value:stamp(pipeline.updated_at || today.generated_at || '')},
  ];
  document.getElementById('top-metrics').innerHTML = metrics.map(item => `
    <div class="metric">
      <span class="label">${esc(item.label)}</span>
      <span class="value">${esc(item.value)}</span>
    </div>`).join('');
}
function renderPipeline(){
  const dataset = state.dataset || {};
  const pipeline = state.pipeline || {};
  const model = state.model || {};
  const today = state.today || {};
  const steps = [
    {
      title:'Bootstrap',
      ok:Boolean(dataset.bootstrap_completed_at || dataset.bootstrap_records),
      details:[['Records', num(dataset.bootstrap_records)],['Sports', joinList(dataset.bootstrap_sports)],['Range', dataset.bootstrap_date_range || '—'],['Completed', stamp(dataset.bootstrap_completed_at)]],
    },
    {
      title:'Append',
      ok:Boolean(dataset.last_append_completed_at || dataset.last_append_date),
      details:[['Records', num(dataset.last_append_records)],['Date', dataset.last_append_date || '—'],['Sports', joinList(dataset.last_append_sports)],['Completed', stamp(dataset.last_append_completed_at)]],
    },
    {
      title:'Train',
      ok:Boolean(model.current_version || model.last_trained_at),
      details:[['Model', model.current_model || '—'],['Version', model.current_version || '—'],['AUC', model.current_auc ?? '—'],['Trained', stamp(model.last_trained_at)]],
    },
    {
      title:'Predict',
      ok:Boolean(today.generated_at || pipeline.prediction_count),
      details:[['Count', num(pipeline.prediction_count)],['Errors', num(pipeline.prediction_errors || 0)],['Version', today.model_version || pipeline.model_version || '—'],['Generated', stamp(today.generated_at)]],
    },
  ];
  document.getElementById('pipeline-steps').innerHTML = steps.map(step => `
    <article class="card">
      <div style="display:flex;justify-content:space-between;gap:8px;align-items:center">
        <h3>${esc(step.title)}</h3>
        <span class="badge ${badgeClass(step.ok, 'warn')}">${step.ok ? 'ready' : 'pending'}</span>
      </div>
      <div class="kv">${step.details.map(([k,v]) => `<div><span class="muted">${esc(k)}</span><strong>${esc(v)}</strong></div>`).join('')}</div>
    </article>`).join('');
  document.getElementById('pipeline-summary').innerHTML = `
    <h3 class="section-title">Pipeline Summary</h3>
    <div class="kv">
      <div><span class="muted">Dataset Repo</span><strong>${esc(pipeline.dataset_repo || dataset.dataset_repo || '—')}</strong></div>
      <div><span class="muted">Model Repo</span><strong>${esc(model.model_repo || pipeline.model_repo || '—')}</strong></div>
      <div><span class="muted">Current Model</span><strong>${esc(model.current_model || pipeline.best_model || '—')}</strong></div>
      <div><span class="muted">Trained Rows</span><strong>${esc(num(model.trained_rows || pipeline.trained_rows))}</strong></div>
      <div><span class="muted">Sports Covered</span><strong>${esc(joinList(model.sports_covered))}</strong></div>
      <div><span class="muted">Last Update</span><strong>${esc(stamp(pipeline.updated_at))}</strong></div>
    </div>`;

  document.getElementById('pipeline-files').innerHTML = `
    <h3 class="section-title">Prediction Output</h3>
    <div class="kv">
      <div><span class="muted">Prediction Count</span><strong>${esc(num(today.prediction_count || 0))}</strong></div>
      <div><span class="muted">Today Date</span><strong>${esc(today.date || '—')}</strong></div>
      <div><span class="muted">Tomorrow Date</span><strong>${esc(state.tomorrow.date || '—')}</strong></div>
      <div><span class="muted">Model Version</span><strong>${esc(today.model_version || '—')}</strong></div>
      <div><span class="muted">Model Type</span><strong>${esc(today.model_type || '—')}</strong></div>
      <div><span class="muted">Generated At</span><strong>${esc(stamp(today.generated_at))}</strong></div>
    </div>`;
}
function renderPredictions(containerId, title, payload){
  const preds = Array.isArray(payload.predictions) ? payload.predictions : [];
  const rows = preds.length ? preds.map(p => `
    <tr>
      <td>${esc((p.sport || '').toUpperCase())}</td>
      <td><span class="match">${esc(p.away_team || 'Away')} @ ${esc(p.home_team || 'Home')}</span><span class="sub">${esc(p.game_date || '')} ${esc(p.game_time || '')}</span></td>
      <td>${esc(pct(p.home_win_prob))}</td>
      <td>${esc(pct(p.away_win_prob))}</td>
      <td><span class="conf ${tierClass(p.confidence_tier)}">${esc(pct(p.confidence))}</span><span class="sub">${esc(p.confidence_tier || 'uncertain')}</span></td>
      <td>${esc(p.model_type || '—')}<span class="sub">${esc(p.model_version || '')}</span></td>
    </tr>`).join('') : `<tr><td colspan="6" class="muted">No predictions available.</td></tr>`;
  document.getElementById(containerId).innerHTML = `
    <table>
      <thead>
        <tr>
          <th colspan="6">${esc(title)} <span class="small">• ${esc(num(payload.prediction_count || 0))} predictions • ${esc(stamp(payload.generated_at))}</span></th>
        </tr>
        <tr>
          <th>Sport</th>
          <th>Match</th>
          <th>Home%</th>
          <th>Away%</th>
          <th>Confidence</th>
          <th>Model</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}
function renderHistory(){
  const combined = [...(state.today.predictions || []), ...(state.tomorrow.predictions || [])].sort((a,b) => `${a.game_date || ''} ${a.game_time || ''}`.localeCompare(`${b.game_date || ''} ${b.game_time || ''}`));
  const rows = combined.length ? combined.map(p => `
    <tr>
      <td>${esc(p.game_date || '—')}</td>
      <td>${esc((p.sport || '').toUpperCase())}</td>
      <td><span class="match">${esc(p.away_team || 'Away')} @ ${esc(p.home_team || 'Home')}</span><span class="sub">${esc(p.game_time || '')}</span></td>
      <td><span class="conf ${tierClass(p.confidence_tier)}">${esc(pct(p.confidence))}</span></td>
      <td>${esc(p.model_type || '—')}<span class="sub">${esc(p.model_version || '')}</span></td>
      <td><span class="sub">${esc(p.prediction_id || '—')}</span></td>
    </tr>`).join('') : `<tr><td colspan="6" class="muted">No prediction history available.</td></tr>`;
  document.getElementById('history-table').innerHTML = `
    <table>
      <thead>
        <tr>
          <th colspan="6">HF Prediction History <span class="small">• current JSON snapshot (${esc(num(combined.length))} rows)</span></th>
        </tr>
        <tr>
          <th>Date</th>
          <th>Sport</th>
          <th>Match</th>
          <th>Confidence</th>
          <th>Model</th>
          <th>Prediction ID</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}
function renderModel(){
  const dataset = state.dataset || {};
  const model = state.model || {};
  document.getElementById('dataset-stats').innerHTML = `
    <h3 class="section-title">Dataset Stats</h3>
    <div class="kv">
      <div><span class="muted">Dataset Repo</span><strong>${esc(dataset.dataset_repo || '—')}</strong></div>
      <div><span class="muted">Bootstrap Records</span><strong>${esc(num(dataset.bootstrap_records))}</strong></div>
      <div><span class="muted">Bootstrap Sports</span><strong>${esc(joinList(dataset.bootstrap_sports))}</strong></div>
      <div><span class="muted">Date Range</span><strong>${esc(dataset.bootstrap_date_range || '—')}</strong></div>
      <div><span class="muted">Last Append</span><strong>${esc(dataset.last_append_date || '—')}</strong></div>
      <div><span class="muted">Updated</span><strong>${esc(stamp(dataset.updated_at))}</strong></div>
    </div>`;
  document.getElementById('current-model').innerHTML = `
    <h3 class="section-title">Current Model</h3>
    <div class="kv">
      <div><span class="muted">Model Repo</span><strong>${esc(model.model_repo || '—')}</strong></div>
      <div><span class="muted">Version</span><strong>${esc(model.current_version || '—')}</strong></div>
      <div><span class="muted">Estimator</span><strong>${esc(model.current_model || '—')}</strong></div>
      <div><span class="muted">AUC</span><strong>${esc(model.current_auc ?? '—')}</strong></div>
      <div><span class="muted">Rows</span><strong>${esc(num(model.trained_rows))}</strong></div>
      <div><span class="muted">Sports Covered</span><strong>${esc(joinList(model.sports_covered))}</strong></div>
      <div><span class="muted">Last Trained</span><strong>${esc(stamp(model.last_trained_at))}</strong></div>
      <div><span class="muted">History Runs</span><strong>${esc(num(model.history_count || 0))}</strong></div>
    </div>`;
  const history = Array.isArray(model.history) ? model.history.slice().reverse() : [];
  const rows = history.length ? history.map(item => `
    <tr>
      <td>${esc(stamp(item.trained_at))}</td>
      <td>${esc(item.version || '—')}</td>
      <td>${esc(item.best_model || '—')}</td>
      <td>${esc(item.cv_roc_auc ?? '—')}</td>
      <td>${esc(num(item.rows))}</td>
      <td>${esc(joinList(item.sports_covered))}</td>
    </tr>`).join('') : `<tr><td colspan="6" class="muted">No training history available.</td></tr>`;
  document.getElementById('training-history').innerHTML = `
    <table>
      <thead>
        <tr><th colspan="6">Training History</th></tr>
        <tr>
          <th>Trained At</th>
          <th>Version</th>
          <th>Model</th>
          <th>AUC</th>
          <th>Rows</th>
          <th>Sports</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}
function renderAll(){
  renderTopMetrics();
  renderPipeline();
  renderPredictions('today-table', 'Today Predictions', state.today || {});
  renderPredictions('tomorrow-table', 'Tomorrow Predictions', state.tomorrow || {});
  renderHistory();
  renderModel();
}
async function refreshAll(){
  const status = document.getElementById('refresh-status');
  status.textContent = 'Refreshing…';
  try{
    const [pipeline, today, tomorrow, dataset, model] = await Promise.all([
      fetchJson('/api/hf/pipeline-status'),
      fetchJson('/api/hf/predictions?date=today'),
      fetchJson('/api/hf/predictions?date=tomorrow'),
      fetchJson('/api/hf/dataset-stats'),
      fetchJson('/api/hf/model-history'),
    ]);
    state.pipeline = pipeline || {};
    state.today = today || {predictions:[]};
    state.tomorrow = tomorrow || {predictions:[]};
    state.dataset = dataset || {};
    state.model = model || {history:[]};
    renderAll();
    status.textContent = `Last refresh ${new Date().toLocaleTimeString()}`;
  }catch(err){
    status.textContent = `Refresh failed: ${err.message}`;
  }
}
function initTabs(){
  const tabs = Array.from(document.querySelectorAll('.tab'));
  tabs.forEach(tab => tab.addEventListener('click', () => {
    tabs.forEach(btn => btn.classList.toggle('active', btn === tab));
    document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
    document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
  }));
}
initTabs();
refreshAll();
setInterval(refreshAll, 60000);
</script>
</body>
</html>
