<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#grad1)"/>
  <!-- Dice (rotated cube) on left -->
  <g transform="translate(28, 40)">
    <!-- Front face of dice -->
    <rect x="0" y="0" width="32" height="32" fill="#000" opacity="0.3" rx="2"/>
    <!-- Dots on dice -->
    <circle cx="8" cy="8" r="2.5" fill="#fff"/>
    <circle cx="16" cy="16" r="2.5" fill="#fff"/>
    <circle cx="24" cy="24" r="2.5" fill="#fff"/>
  </g>
  <!-- Upward arrow on right (trending up) -->
  <g transform="translate(64, 32)">
    <!-- Arrow shaft -->
    <rect x="-2" y="0" width="4" height="28" fill="url(#grad2)"/>
    <!-- Arrow head -->
    <polygon points="0,0 -6,10 6,10" fill="url(#grad2)" transform="translate(0, -8)"/>
  </g>
  <!-- Dollar sign / betting symbol below -->
  <g transform="translate(64, 68)">
    <text x="0" y="16" font-size="24" font-weight="900" fill="#000" opacity="0.8" text-anchor="middle" font-family="Arial, sans-serif">$</text>
  </g>
</svg>
